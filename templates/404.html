{% extends 'base.html' %}
{% block title %}Page Not Found — {{ business_info.company_name }}{% endblock %}
{% block page_title %}Page Not Found{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="text-center max-w-md">
    <div class="text-8xl font-extrabold text-gradient-gold mb-4">404</div>
    <h1 class="text-2xl font-extrabold text-gray-800 mb-2">Page Not Found</h1>
    <p class="text-gray-500 mb-6">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{% url 'audits:dashboard' %}" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-gradient-primary text-white font-bold hover:shadow-2xl hover:shadow-primary transition-all duration-300"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Back to Dashboard</a>
  </div>
</div>
{% endblock %}
