<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Error — {{ business_info.company_name }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: {{ business_info.primary_color|default:'#DA291C' }};
      --secondary: {{ business_info.secondary_color|default:'#FFC72C' }};
      --accent: {{ business_info.accent_color|default:'#27251F' }};
    }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .bg-gradient-primary { background: linear-gradient(135deg, var(--primary) 0%, #8B0000 100%); }
    .text-gradient-gold { background: linear-gradient(135deg, var(--secondary), #FFD700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .pattern-grid { background-image: radial-gradient(color-mix(in srgb, var(--primary) 4%, transparent) 1px, transparent 1px); background-size: 20px 20px; }
  </style>
  <script>
    if (localStorage.getItem('dark') === 'true' || (localStorage.getItem('dark') === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
      localStorage.setItem('dark', 'true');
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen dark:bg-gray-900 flex items-center justify-center" style="background-image: radial-gradient(color-mix(in srgb, var(--primary) 4%, transparent) 1px, transparent 1px); background-size: 20px 20px;">
  <div class="text-center max-w-md">
    <div class="text-8xl font-extrabold text-gradient-gold mb-4">500</div>
    <h1 class="text-2xl font-extrabold text-gray-800 dark:text-gray-100 mb-2">Server Error</h1>
    <p class="text-gray-500 dark:text-gray-400 mb-6">Something went wrong. Please try again later or contact support.</p>
    <a href="{% url 'audits:dashboard' %}" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-gradient-primary text-white font-bold hover:shadow-2xl hover:shadow-primary transition-all duration-300">Back to Dashboard</a>
  </div>
</body>
</html>
