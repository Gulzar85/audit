<!DOCTYPE html>
<html lang="en" x-init="if (localStorage.getItem('dark') === null && window.matchMedia('(prefers-color-scheme: dark)').matches) { localStorage.setItem('dark', 'true'); document.documentElement.classList.add('dark'); } else if (localStorage.getItem('dark') === 'true') { document.documentElement.classList.add('dark'); }">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset Complete — {{ business_info.company_name }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: {{ business_info.primary_color|default:'#DA291C' }}; --secondary: {{ business_info.secondary_color|default:'#FFC72C' }}; --accent: {{ business_info.accent_color|default:'#27251F' }}; }
    .bg-gradient-primary { background: linear-gradient(135deg, var(--primary) 0%, #8B0000 100%); }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .glass-premium { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
    .pattern-grid { background-image: radial-gradient(color-mix(in srgb, var(--primary) 5%, transparent) 1px, transparent 1px), radial-gradient(color-mix(in srgb, var(--secondary) 3%, transparent) 1px, transparent 1px); background-size: 24px 24px, 48px 48px; background-position: 0 0, 12px 12px; }
    @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 33% { transform: translateY(-6px) rotate(0.5deg); } 66% { transform: translateY(4px) rotate(-0.5deg); } }
    .animate-float { animation: float 5s ease-in-out infinite; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .shimmer-line { background: linear-gradient(90deg, transparent 0%, color-mix(in srgb, var(--secondary) 10%, transparent) 50%, transparent 100%); background-size: 200% 100%; animation: shimmer 3s ease-in-out infinite; height: 1px; }
    .decoration-blob-1 { background: linear-gradient(to bottom right, color-mix(in srgb, var(--primary) 5%, transparent), color-mix(in srgb, var(--secondary) 5%, transparent)); }
    .decoration-blob-2 { background: linear-gradient(to top right, color-mix(in srgb, var(--secondary) 5%, transparent), color-mix(in srgb, var(--primary) 5%, transparent)); }
    .dark body { background: #1a1a2e; }
    .dark .glass-premium { background: rgba(30, 30, 60, 0.85); border-color: rgba(255, 255, 255, 0.08); }
    .dark .text-gray-600 { color: #9ca3af !important; }
    .dark .text-gray-700 { color: #d1d5db !important; }
    .dark .text-gray-500 dark:text-gray-400 { color: #9ca3af !important; }
    .dark .text-gray-400 { color: #9ca3af !important; }

  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen dark:bg-gray-900 flex items-center justify-center bg-gradient-to-br from-gray-50 via-gray-50 to-gray-100 dark:from-gray-900 dark:via-gray-900 dark:to-gray-800 p-4 pattern-grid">
  <div class="fixed inset-0 pointer-events-none overflow-hidden">
    <div class="absolute -top-24 -right-24 w-96 h-96 rounded-full decoration-blob-1 blur-3xl"></div>
    <div class="absolute -bottom-24 -left-24 w-[30rem] h-[30rem] rounded-full decoration-blob-2 blur-3xl"></div>
  </div>

  <div class="w-full max-w-md relative animate-fade-in">
    <div class="text-center mb-8">
      <div class="h-16 w-16 rounded-2xl bg-gradient-gold mx-auto mb-4 flex items-center justify-center shadow-xl shadow-yellow-500/30 animate-float">
        <span class="text-3xl font-black text-accent">M</span>
      </div>
      <h1 class="text-2xl font-bold text-accent">{{ business_info.company_name }}</h1>
      <div class="shimmer-line w-24 mx-auto mt-3 mb-3"></div>
    </div>

    <div class="glass-premium rounded-3xl p-8 text-center">
      <div class="h-16 w-16 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-5">
        <i data-lucide="check-circle" class="h-8 w-8 text-green-600"></i>
      </div>
      <h2 class="text-lg font-bold text-gray-800 mb-3">Password Reset Complete</h2>
      <p class="text-sm text-gray-500 leading-relaxed mb-6">Your password has been set. You may go ahead and sign in now.</p>
      <a href="{% url 'accounts:login' %}"
         class="inline-flex items-center gap-2 px-8 py-3 rounded-xl bg-gradient-primary text-white font-bold text-sm hover:shadow-2xl hover:shadow-primary transition-all duration-300 active:scale-[0.98]">
        <i data-lucide="log-in" class="h-4 w-4"></i> Sign In
      </a>
    </div>

    <p class="text-center text-xs text-gray-400 mt-8 font-medium">
      &copy; {% now "Y" %} {{ business_info.company_name|default:"McDonald's Pakistan" }}. All rights reserved.
    </p>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
